version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hiring_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiring_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hiring_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiring_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hiring_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build: .
    container_name: hiring_api
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: hiring_celery
    restart: unless-stopped
    command: celery -A src.scheduler.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (cron scheduler) ────────────────────────────────────────────
  celery_beat:
    build: .
    container_name: hiring_beat
    restart: unless-stopped
    command: celery -A src.scheduler.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - celery_worker

volumes:
  postgres_data:
